<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" role="img" aria-label="Person using a laptop">
  <defs>
    <linearGradient id="o2bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#ffd24d"/><stop offset="0.55" stop-color="#ffa51f"/><stop offset="1" stop-color="#d9620a"/>
    </linearGradient>
    <linearGradient id="o2fig" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#2a1c0c"/><stop offset="1" stop-color="#120c05"/>
    </linearGradient>
    <linearGradient id="o2scr" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#fff4cf"/><stop offset="1" stop-color="#ffd24d"/>
    </linearGradient>
  </defs>
  <rect x="2" y="2" width="60" height="60" rx="15" fill="url(#o2bg)"/>
  <!-- soft top light -->
  <ellipse cx="26" cy="16" rx="20" ry="12" fill="#ffffff" opacity="0.18"/>
  <!-- figure -->
  <path d="M13 51 C13 39 21 34 32 34 C43 34 51 39 51 51 Z" fill="url(#o2fig)"/>
  <rect x="28.5" y="29" width="7" height="8" rx="3" fill="#231708"/>
  <circle cx="32" cy="21" r="9" fill="url(#o2fig)"/>
  <!-- rim light -->
  <path d="M40 18 C41 23 39 29 34 32" stroke="#ffe39a" stroke-width="1.6" fill="none" stroke-linecap="round" opacity="0.7"/>
  <path d="M50 49 C49 42 45 37 39 35" stroke="#ffe39a" stroke-width="1.6" fill="none" stroke-linecap="round" opacity="0.55"/>
  <!-- laptop -->
  <rect x="22" y="37" width="20" height="14" rx="2" fill="#1a1206"/>
  <rect x="24" y="39" width="16" height="10" rx="1" fill="url(#o2scr)"/>
  <path d="M15 51 L49 51 L55 57 L9 57 Z" fill="#1a1206"/>
  <path d="M16.5 51 L47.5 51 L49 52.4 L15 52.4 Z" fill="#3a2a12"/>
